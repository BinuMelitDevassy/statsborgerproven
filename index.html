// Legg til "extra" slik at vi ender på 100 spørsmål totalt.
while (questions.length < 100) {
  const i = questions.length - 25; // start etter de første 25
  const item = extra[i % extra.length];
  questions.push({topic:item[0], q:item[1], options:item[2], a:item[3], vocab:item[4]});
}

// --- App state ---
let idx = 0;
let answered = false;

const elQ = document.getElementById("question");
const elOpts = document.getElementById("options");
const elProgress = document.getElementById("progress");
const elTopic = document.getElementById("topic");
const elFeedback = document.getElementById("feedback");
const btnCheck = document.getElementById("checkBtn");
const btnNext = document.getElementById("nextBtn");
const btnRestart = document.getElementById("restartBtn");

function render() {
  answered = false;
  btnNext.disabled = true;
  elFeedback.style.display = "none";
  elFeedback.className = "feedback";

  const q = questions[idx];
  elProgress.textContent = `Spørsmål ${idx + 1} / ${questions.length}`;
  elTopic.textContent = `Tema: ${q.topic}`;
  elQ.textContent = q.q;

  elOpts.innerHTML = "";
  q.options.forEach((opt, i) => {
    const li = document.createElement("li");
    li.className = "opt";
    li.innerHTML = `
      <label style="display:flex; gap:10px; cursor:pointer;">
        <input type="radio" name="opt" value="${i}" />
        <span>${opt}</span>
      </label>
    `;
    elOpts.appendChild(li);
  });
}

function getSelectedIndex() {
  const checked = document.querySelector('input[name="opt"]:checked');
  return checked ? Number(checked.value) : -1;
}

function showFeedback(isCorrect, selectedIdx) {
  const q = questions[idx];
  const correctText = q.options[q.a];
  const selectedText = selectedIdx >= 0 ? q.options[selectedIdx] : "(ingen valgt)";

  elFeedback.style.display = "block";
  elFeedback.classList.add(isCorrect ? "ok" : "bad");

  const vocabHtml = `
    <div class="vocab">
      <b>Viktige ord:</b>
      <ul>
        ${q.vocab.map(([no,en]) => `<li><b>${no}</b> – ${en}</li>`).join("")}
      </ul>
    </div>
  `;

  if (isCorrect) {
    elFeedback.innerHTML = `
      <b>Riktig ✅</b><br/>
      Du svarte: <i>${selectedText}</i>
      ${vocabHtml}
    `;
  } else {
    elFeedback.innerHTML = `
      <b>Feil ❌</b><br/>
      Du svarte: <i>${selectedText}</i><br/>
      <b>Riktig svar:</b> ${correctText}
      ${vocabHtml}
    `;
  }
}

btnCheck.addEventListener("click", () => {
  if (answered) return;
  const selected = getSelectedIndex();
  const q = questions[idx];
  const isCorrect = (selected === q.a);
  showFeedback(isCorrect, selected);
  answered = true;
  btnNext.disabled = false;
});

btnNext.addEventListener("click", () => {
  if (!answered) return;
  idx = Math.min(idx + 1, questions.length - 1);
  render();
});

btnRestart.addEventListener("click", () => {
  idx = 0;
  render();
});

// Start
render();
</script>
